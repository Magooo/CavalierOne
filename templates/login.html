<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CavalierOne - Login</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1C2B3A;
            --primary-light: #2A3C50;
            --accent: #E5A546;
            --accent-hover: #F6B859;
            --bg-color: #F8F9FA;
            --text-main: #333333;
            --text-muted: #666666;
            --white: #FFFFFF;
            --danger: #E74C3C;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        .login-container {
            background-color: var(--white);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
        }

        .brand h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .brand h1 span {
            color: var(--accent);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 40px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E0E4E8;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background-color: #FCFDFD;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(229, 165, 70, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .btn-submit:hover {
            background-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(229, 165, 70, 0.3);
        }

        .error-message {
            background-color: #FDF2F1;
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            border: 1px solid #FADCDC;
        }

        .footer {
            margin-top: 32px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Cavalier Homes" style="max-height: 55px; margin-bottom: 20px;">
            <h1>Cavalier<span>One</span></h1>
            <p class="subtitle">Secure Team Access</p>
        </div>

        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="you@cavalierhomes.com.au" autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <div class="footer">
            <p>&copy; 2026 Cavalier Homes. All rights reserved.</p>
        </div>
    </div>

</body>
</html>
